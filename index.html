<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Тёмный Лес — Хоррор</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        html, body {
            background: #0a0a0a;
            width: 100%; height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }
        body {
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        .game-wrapper {
            border: 8px solid #1a1410;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 10px rgba(0,0,0,0.8);
            background: #0d0a08;
            padding: 5px;
        }
        canvas { display: block; border-radius: 2px; touch-action: none; }
        .instruction {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #8a7a5a; padding: 6px 14px;
            border-radius: 30px; font-size: 12px; letter-spacing: 1px;
            border: 1px solid #3a2a1a; pointer-events: none; text-shadow: 1px 1px 2px black;
            white-space: nowrap; z-index: 10;
        }
        .lobby-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; color: #ccc;
        }
        .lobby-panel {
            background: #1a1a1a; padding: 30px 40px; border-radius: 16px;
            border: 1px solid #333; min-width: 300px; max-width: 90vw; text-align: center;
        }
        .lobby-panel h1 { color: #d4a373; margin-bottom: 20px; font-size: 26px; letter-spacing: 2px; }
        .lobby-panel input {
            width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444;
            border-radius: 8px; color: #fff; margin-bottom: 12px; font-size: 16px;
        }
        .lobby-panel button {
            width: 100%; padding: 12px; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: 0.2s; font-size: 16px; margin-bottom: 8px;
        }
        .row-buttons { display: flex; gap: 8px; }
        .row-buttons button { flex: 1; }
        #createBtn { background: #3a2a1a; border: 1px solid #d4a373; color: #d4a373; }
        #joinBtn { background: #2a2a3a; border: 1px solid #a3b8d4; color: #a3b8d4; }
        #startGameBtn { display: none; background: #4a6a3a; border: 1px solid #7aaa5a; color: #fff; }
        #roomCodeDisplay { color: #d4a373; font-size: 14px; margin: 8px 0; letter-spacing: 2px; }
        .players-list { margin-top: 16px; font-size: 14px; color: #888; text-align: left; }
        .players-list div { padding: 4px 0; }
        #statusMsg { color: #c56a6a; font-size: 13px; min-height: 18px; margin-top: 6px; }
    </style>
</head>
<body>

    <div id="lobbyOverlay" class="lobby-overlay">
        <div class="lobby-panel">
            <h1>🔦 Тёмный Лес</h1>
            <input id="playerName" type="text" placeholder="Ваше имя..." maxlength="20">
            <div class="row-buttons">
                <button id="createBtn">Создать комнату</button>
            </div>
            <input id="roomCode" type="text" placeholder="Код комнаты..." maxlength="4" style="text-transform:uppercase; margin-top:8px;">
            <div class="row-buttons">
                <button id="joinBtn">Войти по коду</button>
            </div>
            <div id="roomCodeDisplay"></div>
            <div id="statusMsg"></div>
            <div id="playersList" class="players-list">
                <div style="color:#555;">Ожидание игроков...</div>
            </div>
            <button id="startGameBtn">Начать игру</button>
        </div>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <div class="instruction">WASD / стрелки, либо джойстик пальцем слева</div>

    <!-- Музыка: положи свои файлы в /public/music/ с этими именами (см. пояснение в чате) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="/music/ambient.mp3" type="audio/mpeg">
    </audio>
    <audio id="chaseMusic" loop preload="auto">
        <source src="/music/chase.mp3" type="audio/mpeg">
    </audio>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared/person.js"></script>
    <script src="/engine.js"></script>
</body>
</html>
